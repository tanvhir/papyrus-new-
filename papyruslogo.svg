<svg width="36" height="44" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="leafGrad" x1="6" y1="0" x2="30" y2="44" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#66BB6A"/>
    <stop offset="20%" stop-color="#43A047"/>
    <stop offset="45%" stop-color="#2E7D32"/>
    <stop offset="70%" stop-color="#1B5E20"/>
    <stop offset="100%" stop-color="#0B2E10"/>
  </linearGradient>
  <linearGradient id="vMid" x1="30" y1="4" x2="11" y2="38" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#1B5E20" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0B2E10" stop-opacity="0.3"/>
  </linearGradient>
  <linearGradient id="vSide" x1="20" y1="20" x2="5" y2="20" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#A5D6A7" stop-opacity="0.3"/>
  </linearGradient>
  <radialGradient id="gloss" cx="50%" cy="50%" r="50%" gradientTransform="translate(0.32 0.18) rotate(35) scale(0.42 0.95)">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rim" cx="20%" cy="10%" r="90%">
    <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.5"/>
    <stop offset="40%" stop-color="#A5D6A7" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="leafClip">
    <path d="M32 2C32 2 20 0 10 10C4 16 2 24 3 30C4 34 7 37 11 38C15 39 20 38 24 35C30 30 34 22 34 14C34 8 32 2 32 2Z"/>
  </clipPath>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="1.2" stdDeviation="1" flood-color="#0B2E10" flood-opacity="0.35"/>
  </filter>
</defs>

<g filter="url(#softShadow)">
  <path d="M32 2C32 2 20 0 10 10C4 16 2 24 3 30C4 34 7 37 11 38C15 39 20 38 24 35C30 30 34 22 34 14C34 8 32 2 32 2Z" fill="url(#leafGrad)"/>

  <g clip-path="url(#leafClip)">
    <!-- rim light along the top-left edge for dimensional, glossy feel -->
    <path d="M10 10C4 16 2 24 3 30" stroke="url(#rim)" stroke-width="4" fill="none" stroke-linecap="round"/>

    <g fill="none" stroke-linecap="round">
      <!-- Main midrib: subtle groove, not a glow -->
      <path d="M30 4 C26 12, 20 24, 11 38" stroke="url(#vMid)" stroke-width="1"/>

      <!-- Primary veins: gentle organic bow, fanning to the margin -->
      <path d="M28.7 6.5 Q25.8 4.2 23.5 4.7" stroke="url(#vSide)" stroke-width="0.6"/>
      <path d="M28.7 6.5 Q31.3 4.8 33 6" stroke="url(#vSide)" stroke-width="0.6"/>

      <path d="M26.3 11 Q20 8 16.5 8.3" stroke="url(#vSide)" stroke-width="0.85"/>
      <path d="M26.3 11 Q30.5 9.3 33.2 10.8" stroke="url(#vSide)" stroke-width="0.85"/>

      <path d="M23.6 16 Q15 12.7 9 13" stroke="url(#vSide)" stroke-width="1"/>
      <path d="M23.6 16 Q29.5 14 33 15.5" stroke="url(#vSide)" stroke-width="1"/>

      <path d="M20.7 21.3 Q12 18.5 5.7 19.3" stroke="url(#vSide)" stroke-width="0.95"/>
      <path d="M20.7 21.3 Q27 19.3 31.5 21" stroke="url(#vSide)" stroke-width="0.95"/>

      <path d="M17.8 26.5 Q10.5 24.7 5 26.5" stroke="url(#vSide)" stroke-width="0.85"/>
      <path d="M17.8 26.5 Q24.5 25.3 28.8 27.2" stroke="url(#vSide)" stroke-width="0.85"/>

      <path d="M15 31.5 Q9.5 30 6.5 32.5" stroke="url(#vSide)" stroke-width="0.7"/>
      <path d="M15 31.5 Q20.5 31 24.3 33.3" stroke="url(#vSide)" stroke-width="0.7"/>

      <path d="M12.5 35.8 Q9.8 34.8 8.7 36.8" stroke="url(#vSide)" stroke-width="0.55"/>
      <path d="M12.5 35.8 Q15.8 36 18 37.5" stroke="url(#vSide)" stroke-width="0.55"/>
    </g>

    <!-- glossy specular sheen, layered on top -->
    <ellipse cx="18" cy="14" rx="16" ry="20" fill="url(#gloss)" style="mix-blend-mode:screen"/>
  </g>
</g>

<path d="M11 38C9 40 6 42 3 43" stroke="#3E2723" stroke-width="2" stroke-linecap="round" fill="none"/>
<path d="M3 43C1 43 0 42 0.5 40.5C1 39 2.5 39.5 2 40.5" stroke="#1B5E20" stroke-width="1" stroke-linecap="round" fill="none"/>
</svg>
